<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body>
    <div class="header">
        <button id="targetBtn"><b>Target</b></button>
        <div class="controls">
            <button id="startBtn"><b>Start</b></button>
            <button id="stopBtn"><b>Stop</b></button>
        </div>
    </div>

    <div id="cameraContainer">
        <div id="placeholder">
            <svg width="100" height="100" viewBox="0 0 24 24" fill="rgb(192,192,192)">
                <path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3z"/>
            </svg>
        </div>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div id="errorPopup" class="hidden">
        <div class="popup-content">
            <b>ATTENZIONE!<br>Target non valido</b>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none">
</body>
</html>
